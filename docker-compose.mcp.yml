version: '3.8'

services:
  mcp-postgres:
    image: mcp/postgres
    container_name: mcp-postgres
    environment:
      DATABASE_URL: postgres://postgres:Dourados1000@crm-loja_db-whatsapp:5432/crm-loja?sslmode=disable
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mcp-config:/config

  mcp-redis:
    image: mcp/redis
    container_name: mcp-redis
    environment:
      REDIS_URL: redis://default:w5q38zychxrhx1qtzeix@crm-loja_redis-whatsapp:6379
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mcp-config:/config

  mcp-ssh:
    image: mcp/ssh
    container_name: mcp-ssh
    environment:
      SSH_HOST: 217.216.65.15
      SSH_USER: root
      SSH_PASSWORD: Dourados1000
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mcp-config:/config

volumes:
  mcp-config:
    driver: local
